<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Notifro: Compose once. Deliver everywhere.</title>
    <meta
      name="description"
      content="Notifro dashboard: compose and deliver notifications across Slack, email, Teams, Discord, push, and in-app from one unified API."
    />
    <!-- The app/dashboard is gated and should not be indexed; the marketing site is the public surface. -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Icons / PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#FFFFFF" />

    <!-- Open Graph / Twitter (for link unfurls when sharing app links) -->
    <meta property="og:site_name" content="Notifro" />
    <meta property="og:title" content="Notifro" />
    <meta
      property="og:description"
      content="Compose once, deliver everywhere, the Notifro notification dashboard."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://notifro.com/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://notifro.com/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
